<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Gallery</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #333; }
    .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
    .gallery img { width: 150px; height: 100px; object-fit: cover; border: 2px solid #ccc; cursor: pointer; transition: transform 0.2s; }
    .gallery img:hover { transform: scale(1.1); border-color: #666; }
    .lightbox { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; flex-direction: column; color: #fff; opacity: 0; transition: opacity 0.6s ease; }
    .lightbox.show { display: flex; opacity: 1; }
    .lightbox img { max-width: 90%; max-height: 70%; border: 4px solid #fff; opacity: 0; animation: fadeIn 0.8s forwards; }
    .caption { margin-top: 10px; font-size: 18px; text-align: center; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 5px; max-width: 90%; opacity: 0; animation: fadeIn 1s forwards; }
    .progress-bar { width: 90%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden; margin-top: 10px; }
    .progress { height: 100%; width: 0%; background: #4caf50; transition: width 3s linear; }
    .controls { margin-top: 15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; }
    .controls button, .controls select { background: #fff; border: none; padding: 10px 14px; cursor: pointer; font-size: 14px; border-radius: 5px; transition: background 0.2s; }
    .controls button:hover, .controls select:hover { background: #ddd; }
    .controls .active { background: #4caf50; color: #fff; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <h1>My Photo Gallery</h1>

  <div class="gallery">
    <img src="https://via.placeholder.com/600x400?text=Photo+1" alt="Beautiful Sunset">
    <img src="https://via.placeholder.com/600x400?text=Photo+2" alt="Mountain View">
    <img src="https://via.placeholder.com/600x400?text=Photo+3" alt="City Lights">
    <img src="https://via.placeholder.com/600x400?text=Photo+4" alt="Ocean Waves">
    <img src="https://via.placeholder.com/600x400?text=Photo+5" alt="Forest Path">
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <img src="" alt="Expanded view" id="lightboxImg">
    <div class="caption" id="caption"></div>
    <div class="progress-bar" aria-hidden="true"><div class="progress" id="progress"></div></div>
    <div class="controls">
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
      <button id="closeBtn">Close</button>
      <button id="slideshowBtn">Start Slideshow</button>
      <button id="shuffleBtn">Shuffle Off</button>
      <label for="speedSelector" style="color:#333; background:transparent; padding:0 6px;">Speed</label>
      <select id="speedSelector">
        <option value="2000">2s</option>
        <option value="3000" selected>3s</option>
        <option value="5000">5s</option>
      </select>
    </div>
  </div>

  <script>
    const galleryImages = Array.from(document.querySelectorAll('.gallery img'));
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const caption = document.getElementById('caption');
    const progress = document.getElementById('progress');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const closeBtn = document.getElementById('closeBtn');
    const slideshowBtn = document.getElementById('slideshowBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const speedSelector = document.getElementById('speedSelector');

    let currentIndex = 0;
    let slideshowInterval = null;
    let slideshowSpeed = parseInt(speedSelector.value);
    let shuffleMode = false;
    let historyStack = []; // for previous navigation in shuffle mode

    // Utility: pick random index not equal to current (if possible)
    function randomIndex(exclude) {
      if (galleryImages.length <= 1) return 0;
      let idx;
      do { idx = Math.floor(Math.random() * galleryImages.length); } while (idx === exclude);
      return idx;
    }

    function showImage(index, pushHistory = true) {
      // Update lightbox visibility and content
      lightbox.classList.add('show');
      lightbox.setAttribute('aria-hidden', 'false');
      lightboxImg.style.animation = 'none';
      caption.style.animation = 'none';
      void lightboxImg.offsetWidth; // reflow to restart animations
      void caption.offsetWidth;
      lightboxImg.src = galleryImages[index].src;
      caption.textContent = galleryImages[index].alt || '';
      lightboxImg.style.animation = 'fadeIn 0.8s forwards';
      caption.style.animation = 'fadeIn 1s forwards';
      currentIndex = index;

      // Manage history for previous navigation
      if (pushHistory) {
        // Avoid pushing duplicate consecutive entries
        if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== index) {
          historyStack.push(index);
        }
      }

      resetProgress();
    }

    // Thumbnail click opens lightbox and resets history
    galleryImages.forEach((img, idx) => {
      img.addEventListener('click', () => {
        historyStack = [];
        showImage(idx, true);
      });
    });

    // Previous: if history has more than one entry, pop current and show last; otherwise go sequentially
    prevBtn.addEventListener('click', () => {
      if (historyStack.length > 1) {
        historyStack.pop(); // remove current
        const prevIndex = historyStack[historyStack.length - 1];
        showImage(prevIndex, false); // don't push into history again
      } else {
        // fallback to sequential previous
        currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
        showImage(currentIndex);
      }
    });

    // Next: respects shuffle mode
    nextBtn.addEventListener('click', () => {
      if (shuffleMode) {
        const nextIdx = randomIndex(currentIndex);
        showImage(nextIdx);
      } else {
        currentIndex = (currentIndex + 1) % galleryImages.length;
        showImage(currentIndex);
      }
    });

    // Close with fade-out
    function closeLightbox() {
      lightbox.style.opacity = '0';
      lightbox.setAttribute('aria-hidden', 'true');
      setTimeout(() => {
        lightbox.classList.remove('show');
        lightbox.style.opacity = '';
        stopSlideshow();
      }, 600);
    }
    closeBtn.addEventListener('click', closeLightbox);

    // Click outside to close
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (event) => {
      if (!lightbox.classList.contains('show')) return;
      if (event.key === 'ArrowLeft') prevBtn.click();
      else if (event.key === 'ArrowRight') nextBtn.click();
      else if (event.key === 'Escape') closeLightbox();
    });

    // Progress bar handling
    function resetProgress() {
      if (!slideshowInterval) {
        progress.style.transition = 'none';
        progress.style.width = '0%';
        return;
      }
      progress.style.transition = 'none';
      progress.style.width = '0%';
      void progress.offsetWidth; // reflow
      progress.style.transition = `width ${slideshowSpeed}ms linear`;
      progress.style.width = '100%';
    }

    // Slideshow controls
    function startSlideshow() {
      slideshowBtn.textContent = 'Stop Slideshow';
      resetProgress();
      slideshowInterval = setInterval(() => {
        if (shuffleMode) {
          const nextIdx = randomIndex(currentIndex);
          showImage(nextIdx);
        } else {
          currentIndex = (currentIndex + 1) % galleryImages.length;
          showImage(currentIndex);
        }
      }, slideshowSpeed);
    }

    function stopSlideshow() {
      slideshowBtn.textContent = 'Start Slideshow';
      clearInterval(slideshowInterval);
      slideshowInterval = null;
      progress.style.transition = 'none';
      progress.style.width = '0%';
    }

    slideshowBtn.addEventListener('click', () => {
      if (slideshowInterval) stopSlideshow();
      else startSlideshow();
    });

    // Shuffle toggle
    function updateShuffleUI() {
      if (shuffleMode) {
        shuffleBtn.textContent = 'Shuffle On';
        shuffleBtn.classList.add('active');
      } else {
        shuffleBtn.textContent = 'Shuffle Off';
        shuffleBtn.classList.remove('active');
      }
    }

    shuffleBtn.addEventListener('click', () => {
      shuffleMode = !shuffleMode;
      // clear history when turning shuffle on to avoid confusing prev behavior
      if (shuffleMode) historyStack = [currentIndex];
      updateShuffleUI();
    });

    // Speed selector
    speedSelector.addEventListener('change', () => {
      slideshowSpeed = parseInt(speedSelector.value);
      // update progress transition and restart slideshow if running
      if (slideshowInterval) {
        stopSlideshow();
        startSlideshow();
      }
    });

    // Ensure progress resets when user manually navigates while slideshow is running
    [prevBtn, nextBtn].forEach(btn => {
      btn.addEventListener('click', () => {
        if (slideshowInterval) resetProgress();
      });
    });

    // Accessibility: open first image by default? No — wait for user action.
    updateShuffleUI();
  </script>
</body>
</html>
